<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | FB ARCHIVE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 確保影片在輪播中大小一致 */
        .carousel-item video, .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* 影片播放按鈕樣式 (選填) */
        .carousel-item video::-webkit-media-controls-panel {
            background-color: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">FB ARCHIVE</a>
            <div class="links">
                <a href="index.html">HOME</a>
                <a href="map.html">MAP</a>
                <a href="archive.html">ARCHIVE</a>
            </div>
        </div>
    </nav>

    <div class="filter-section fade-in">
        <input type="text" id="searchInput" placeholder="搜尋地點或描述...">
        <select id="celebrityFilter">
            <option value="">所有藝人</option>
            <option value="Freen & Becky">Freen & Becky</option>
            <option value="Freen">Freen</option>
            <option value="Becky">Becky</option>
        </select>
        <select id="dateFilter">
            <option value="">所有年份</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
        </select>
    </div>

    <main class="container">
        <div id="grid" class="grid-layout"></div>
    </main>

    <script src="data.js"></script>
    <script>
        const grid = document.getElementById('grid');
        let slideStates = {}; 

        // --- 新增：判斷媒體類型的函數 ---
        function renderMedia(url) {
            const videoExtensions = ['.mp4', '.webm', '.mov', '.ogg'];
            const isVideo = videoExtensions.some(ext => url.toLowerCase().endsWith(ext));

            if (isVideo) {
                // muted 確保可以自動播放，controls 讓使用者可以按暫停/調整音量
                return `<video src="${url}" controls muted playsinline class="carousel-video"></video>`;
            } else {
                return `<img src="${url}" alt="media">`;
            }
        }

        function renderData(data) {
            grid.innerHTML = '';
            if (data.length === 0) {
                grid.innerHTML = '<p style="text-align:center; color:#888; grid-column: 1/-1;">目前沒有相關資料...</p>';
                return;
            }

            data.forEach((item, index) => {
                // 使用 renderMedia 處理每一筆媒體
                let slidesHtml = item.images.map(img => `
                    <div class="carousel-item">${renderMedia(img.url)}</div>
                `).join('');

                let tagsHtml = item.images.map((img, i) => `
                    <div class="info-tag-container" data-img-idx="${i}">
                        <span class="info-tag"># ${img.platform || 'Archive'}</span>
                        <span class="info-tag"># ${img.category || 'Media'}</span>
                        <span class="info-tag">@ ${img.author || 'Admin'}</span>
                    </div>
                `).join('');

                grid.innerHTML += `
                    <div class="card fade-in">
                        <div class="carousel">
                            <div class="carousel-inner" id="inner-${index}">
                                ${slidesHtml}
                            </div>
                            ${item.images.length > 1 ? `
                                <button class="carousel-btn prev" onclick="moveSlide(${index}, -1)">❮</button>
                                <button class="carousel-btn next" onclick="moveSlide(${index}, 1)">❯</button>
                            ` : ''}
                        </div>
                        <div style="margin-top:15px;">
                            <h3 class="serif gold-text" style="margin:0;">${item.name}</h3>
                            <p style="font-size:0.85rem; color:#888; margin:5px 0;">${item.celebrity} | ${item.date}</p>
                            <div id="tags-${index}">${tagsHtml}</div>
                            <p style="margin-top:10px; font-size:0.95rem; color:var(--text);">${item.desc}</p>
                        </div>
                    </div>
                `;
                updateTagsVisibility(index, 0);
            });
        }

        // 輪播控制邏輯 (保持不變)
        function moveSlide(itemIdx, dir) {
            const inner = document.getElementById(`inner-${itemIdx}`);
            const total = inner.children.length;
            if (slideStates[itemIdx] === undefined) slideStates[itemIdx] = 0;
            
            // 如果切換時有影片正在播放，可以在這裡加入暫停邏輯 (選填)
            const currentVideo = inner.children[slideStates[itemIdx]].querySelector('video');
            if (currentVideo) currentVideo.pause();

            slideStates[itemIdx] = (slideStates[itemIdx] + dir + total) % total;
            inner.style.transform = `translateX(-${slideStates[itemIdx] * 100}%)`;
            updateTagsVisibility(itemIdx, slideStates[itemIdx]);
        }

        function updateTagsVisibility(itemIdx, activeIdx) {
            const tagGroups = document.querySelectorAll(`#tags-${itemIdx} .info-tag-container`);
            tagGroups.forEach((group, i) => {
                group.style.display = (i === activeIdx) ? 'flex' : 'none';
            });
        }

        function filter() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const c = document.getElementById('celebrityFilter').value;
            const d = document.getElementById('dateFilter').value;
            
            const filtered = FB_DATA.filter(i => {
                const dateStr = i.date ? i.date.toString() : "";
                return (i.name.toLowerCase().includes(s) || i.desc.toLowerCase().includes(s)) &&
                       (c === "" || i.celebrity === c) &&
                       (d === "" || dateStr.includes(d));
            });
            renderData(filtered);
        }

        document.querySelectorAll('.filter-section input, .filter-section select').forEach(el => {
            el.addEventListener('input', filter);
        });

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const searchKeyword = urlParams.get('search');
            if (searchKeyword) {
                document.getElementById('searchInput').value = searchKeyword;
                filter();
                window.history.replaceState({}, document.title, "archive.html");
            } else {
                renderData(FB_DATA);
            }
        };
    </script>
</body>
</html>
